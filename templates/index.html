<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5"> <title>Hue-Queue Artist Feed</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: system-ui, sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card { background: #2d2d2d; border-radius: 12px; overflow: hidden; border: 2px solid #444; }
        .card img { width: 100%; height: auto; display: block; }
        .label { padding: 15px; text-align: center; font-size: 2em; font-weight: bold; color: #00ffcc; }
    </style>
</head>
<body>
    <div class="grid">
        {% for photo in photos %}
        <div class="card">
            <img src="{{ url_for('static', filename='photos/' + photo) }}">
            <div class="label">#{{ photo.split('.')[0] }}</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
